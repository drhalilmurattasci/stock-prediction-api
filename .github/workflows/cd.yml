name: cd

on:
  release:
    types: [ published ]

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            STOCKAPI_BUILD_REVISION=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}

  # TODO(P5): add a deploy job (SSH to Hostinger VPS -> docker compose pull &&
  # docker compose --profile app up -d, recording the deployed image digest into
  # forecast provenance) once the VPS + secrets are provisioned.
