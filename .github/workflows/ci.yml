name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (core + dev)
        run: uv sync --frozen --extra dev

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Mypy (type-check)
        run: uv run mypy

      - name: Pytest
        run: uv run pytest

  live-postgres:
    name: Live PostgreSQL / TimescaleDB
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      # This job never receives or uses vendor credentials.
      AUTOMATION_ENABLED: "false"
      POLYGON_TOTAL_CALL_BUDGET: "0"
      POLYGON_API_KEY: ""
      FMP_API_KEY: ""
      FINNHUB_API_KEY: ""
      NASDAQ_DATA_LINK_API_KEY: ""
      ALPACA_API_KEY: ""
      ALPACA_API_SECRET: ""
      DATABENTO_API_KEY: ""
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install locked test dependencies
        run: uv sync --frozen --extra dev

      - name: Run destructive throwaway-database gate
        run: sh scripts/ci-live-database-gate.sh
