name: stock-api

# Default `docker compose up` starts backing infra only (matches the native-dev
# flow in INSTALL.md). The API is under `app`; persistent workers and Beat are
# under the separate `automation` profile and also require the default-off
# AUTOMATION_ENABLED runtime gate. Enable both profiles only after budgeting
# unattended work.
# (requires a committed uv.lock — run `uv lock` first).

services:
  timescaledb:
    image: timescale/timescaledb:2.28.2-pg17
    container_name: stockapi-timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:?POSTGRES_APP_PASSWORD is required}
      POSTGRES_SNAPSHOT_BUILDER_PASSWORD: ${POSTGRES_SNAPSHOT_BUILDER_PASSWORD:?POSTGRES_SNAPSHOT_BUILDER_PASSWORD is required}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
      - ./scripts/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cache:
    image: redis:7-alpine
    container_name: stockapi-redis-cache
    command:
      [
        "redis-server",
        "--save",
        "",
        "--appendonly",
        "no",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "noeviction",
      ]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-celery:
    image: redis:7-alpine
    container_name: stockapi-redis-celery
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory-policy",
        "noeviction",
      ]
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - ./data/redis-celery:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: python:3.12-slim
    container_name: stockapi-mlflow
    working_dir: /mlflow
    # Local-dev deviation: sqlite backend + local artifact dir. Production keeps
    # filesystem artifacts with offsite backups until a managed object store is needed.
    command: >
      bash -c "pip install --no-cache-dir mlflow-skinny>=2.19 &&
               mlflow server --host 0.0.0.0 --port 5000
               --backend-store-uri sqlite:////mlflow/mlflow.db
               --artifacts-destination /mlflow/artifacts"
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./data/mlflow:/mlflow

  api:
    profiles: ["app"]
    image: ${STOCKAPI_API_IMAGE:-stock-api-api}
    build: .
    container_name: stockapi-api
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://stockapi_app:${POSTGRES_APP_URL_PASSWORD}@timescaledb:5432/${POSTGRES_DB}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-5}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-5}
      DATABASE_POOL_TIMEOUT: ${DATABASE_POOL_TIMEOUT:-30}
      API_STATEMENT_TIMEOUT_MS: ${API_STATEMENT_TIMEOUT_MS:-5000}
      REDIS_CACHE_URL: redis://redis-cache:6379/0
      RATE_LIMIT_STORAGE_URI: redis://redis-cache:6379/1
      RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT:-120/minute}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_STORAGE_TIMEOUT_SECONDS: ${RATE_LIMIT_STORAGE_TIMEOUT_SECONDS:-1}
      CELERY_BROKER_URL: redis://redis-celery:6379/0
      CELERY_RESULT_BACKEND: redis://redis-celery:6379/1
      MLFLOW_TRACKING_URI: http://mlflow:5000
      JWT_SECRET: ${JWT_SECRET:-change_me_random_64_chars}
      API_KEYS: ${API_KEYS:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      FORECAST_RESOLUTION_POLICY_HASH: ${FORECAST_RESOLUTION_POLICY_HASH:-}
      FORECAST_TRUSTED_AVAILABILITY_RULE_SET_HASH: ${FORECAST_TRUSTED_AVAILABILITY_RULE_SET_HASH:-}
      FORECAST_SEASONAL_PERIOD: ${FORECAST_SEASONAL_PERIOD:-5}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-celery:
        condition: service_healthy

  worker:
    profiles: ["automation"]
    build: .
    container_name: stockapi-worker
    # The current Polygon guard is process-local. Keep one worker process until
    # the planned Redis-backed, cross-worker guard replaces it.
    command:
      [
        "celery",
        "-A",
        "ingestion.celery_app.celery_app",
        "worker",
        "--loglevel=INFO",
        "--concurrency=1",
      ]
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AUTOMATION_ENABLED: ${AUTOMATION_ENABLED:-false}
      DATABASE_URL: postgresql+asyncpg://stockapi_app:${POSTGRES_APP_URL_PASSWORD}@timescaledb:5432/${POSTGRES_DB}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-5}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-5}
      DATABASE_POOL_TIMEOUT: ${DATABASE_POOL_TIMEOUT:-30}
      REDIS_CACHE_URL: redis://redis-cache:6379/0
      CELERY_BROKER_URL: redis://redis-celery:6379/0
      CELERY_RESULT_BACKEND: redis://redis-celery:6379/1
      MLFLOW_TRACKING_URI: http://mlflow:5000
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      POLYGON_MAX_CALLS_PER_WINDOW: ${POLYGON_MAX_CALLS_PER_WINDOW:-5}
      POLYGON_RATE_WINDOW_SECONDS: ${POLYGON_RATE_WINDOW_SECONDS:-60}
      POLYGON_TOTAL_CALL_BUDGET: ${POLYGON_TOTAL_CALL_BUDGET:-0}
      FMP_API_KEY: ${FMP_API_KEY:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      NASDAQ_DATA_LINK_API_KEY: ${NASDAQ_DATA_LINK_API_KEY:-}
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:-}
      DATABENTO_API_KEY: ${DATABENTO_API_KEY:-}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-celery:
        condition: service_healthy

  snapshot-builder:
    profiles: ["automation"]
    image: ${STOCKAPI_SNAPSHOT_BUILDER_IMAGE:-stock-api-snapshot-builder}
    build: .
    container_name: stockapi-snapshot-builder
    command:
      [
        "celery",
        "-A",
        "ingestion.snapshot_celery_app.snapshot_celery_app",
        "worker",
        "--loglevel=INFO",
        "--concurrency=1",
        "--queues=snapshot-builder",
      ]
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AUTOMATION_ENABLED: ${AUTOMATION_ENABLED:-false}
      DATABASE_URL: postgresql+asyncpg://stockapi_snapshot_builder:${POSTGRES_SNAPSHOT_BUILDER_URL_PASSWORD}@timescaledb:5432/${POSTGRES_DB}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-5}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-5}
      DATABASE_POOL_TIMEOUT: ${DATABASE_POOL_TIMEOUT:-30}
      CELERY_BROKER_URL: redis://redis-celery:6379/0
      CELERY_RESULT_BACKEND: redis://redis-celery:6379/1
      FORECAST_RESOLUTION_POLICY_HASH: ${FORECAST_RESOLUTION_POLICY_HASH:-}
      FORECAST_TRUSTED_AVAILABILITY_RULE_SET_HASH: ${FORECAST_TRUSTED_AVAILABILITY_RULE_SET_HASH:-}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis-celery:
        condition: service_healthy

  beat:
    profiles: ["automation"]
    build: .
    container_name: stockapi-beat
    command: ["celery", "-A", "ingestion.celery_app.celery_app", "beat", "--loglevel=INFO"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AUTOMATION_ENABLED: ${AUTOMATION_ENABLED:-false}
      CELERY_BROKER_URL: redis://redis-celery:6379/0
      CELERY_RESULT_BACKEND: redis://redis-celery:6379/1
      POLYGON_TOTAL_CALL_BUDGET: ${POLYGON_TOTAL_CALL_BUDGET:-0}
    depends_on:
      redis-celery:
        condition: service_healthy
